<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baromètre territorial Urssaf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08131c;
      --bg-soft: #0d1b27;
      --panel: rgba(8, 19, 28, 0.52);
      --panel-strong: rgba(8, 19, 28, 0.74);
      --panel-faint: rgba(255, 255, 255, 0.06);
      --line: rgba(255, 255, 255, 0.1);
      --line-strong: rgba(255, 255, 255, 0.18);
      --text: #eef7ff;
      --muted: rgba(238, 247, 255, 0.7);
      --muted-soft: rgba(238, 247, 255, 0.48);
      --shadow: 0 40px 120px rgba(0, 0, 0, 0.35);
      --radius-xl: 36px;
      --radius-lg: 26px;
      --radius-md: 20px;
      --accent: #78eccb;
      --accent-deep: #189b7f;
      --accent-secondary: #8db8ff;
      --accent-glow: rgba(120, 236, 203, 0.26);
      --danger: #ff9783;
      --warning: #ffd37a;
      --neutral: rgba(255, 255, 255, 0.12);
      --bg-orb-a: rgba(125, 210, 255, 0.16);
      --bg-orb-b: rgba(128, 255, 210, 0.16);
      --bg-orb-c: rgba(255, 177, 121, 0.08);
      --stage-glow-a: rgba(123, 215, 255, 0.18);
      --stage-glow-b: rgba(122, 241, 203, 0.12);
      --button-active-a: rgba(123, 215, 255, 0.2);
      --button-active-b: rgba(122, 241, 203, 0.16);
      --hero-action-a: rgba(123, 215, 255, 0.18);
      --hero-action-b: rgba(122, 241, 203, 0.12);
      --map-idle: rgba(255,255,255,0.06);
      --map-empty: rgba(255,255,255,0.05);
      --map-unavailable: rgba(255,255,255,0.08);
      --focus-stroke: rgba(255,255,255,0.76);
      --focus-glow: rgba(255,255,255,0.18);
      --scene-sea-a: rgba(34, 110, 146, 0.9);
      --scene-sea-b: rgba(7, 30, 45, 0.98);
      --scene-foam: rgba(226, 246, 255, 0.58);
      --scene-relief-shadow: rgba(5, 14, 20, 0.36);
      --scene-cloud: rgba(248, 252, 255, 0.78);
      --scene-monument-glow: rgba(255, 236, 190, 0.42);
      --shell-width: min(calc(100% - 28px), 1520px);
      --chapter-rail-top: 18px;
      --chapter-scroll-margin: 168px;
      --chapter-tone-1: linear-gradient(135deg, rgba(232, 241, 255, 0.98), rgba(170, 200, 255, 0.92));
      --chapter-tone-2: linear-gradient(135deg, rgba(255, 232, 246, 0.98), rgba(232, 171, 215, 0.92));
      --chapter-tone-3: linear-gradient(135deg, rgba(232, 255, 235, 0.98), rgba(181, 235, 185, 0.92));
      --chapter-tone-4: linear-gradient(135deg, rgba(230, 245, 255, 0.98), rgba(165, 205, 245, 0.92));
      --chapter-shadow-1: rgba(115, 160, 255, 0.24);
      --chapter-shadow-2: rgba(231, 143, 210, 0.24);
      --chapter-shadow-3: rgba(137, 221, 163, 0.24);
      --chapter-shadow-4: rgba(116, 177, 236, 0.24);
      --chapter-rail-line: rgba(214, 228, 255, 0.2);
      --chapter-tab-min-width: 238px;
      --chapter-tab-gap: 8px;
      --chapter-tab-height: 76px;
      --chapter-tab-height-active: 88px;
      --chapter-tab-skew-right: 34px;
      --chapter-tab-skew-left: 0px;
      --chapter-tab-overlay: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04) 42%, rgba(255,255,255,0) 100%);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, var(--bg-orb-a), transparent 28%),
        radial-gradient(circle at 84% 16%, var(--bg-orb-b), transparent 24%),
        radial-gradient(circle at 50% 100%, var(--bg-orb-c), transparent 30%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.9), transparent 94%);
    }
    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(123, 215, 255, 0.1), transparent 20%),
        radial-gradient(circle at 80% 22%, rgba(122, 241, 203, 0.14), transparent 26%),
        radial-gradient(circle at 55% 78%, rgba(255, 214, 143, 0.08), transparent 20%);
      filter: blur(42px);
      opacity: 0.7;
    }

    .page {
      width: var(--shell-width);
      margin: 18px auto 46px;
      position: relative;
      z-index: 1;
    }

    .glass {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
    }
    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, rgba(255,255,255,0.28), transparent 28%),
        radial-gradient(circle at top right, rgba(255,255,255,0.16), transparent 36%);
      mix-blend-mode: screen;
      opacity: 0.9;
    }
    .shell {
      border-radius: 44px;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        var(--panel-strong);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 45px 120px rgba(0, 0, 0, 0.45);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 28px;
      margin-bottom: 16px;
      background: var(--panel-faint);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .brand img {
      width: 130px;
      height: auto;
      display: block;
      filter: drop-shadow(0 12px 28px rgba(0,0,0,0.22));
    }
    .brand-meta {
      min-width: 0;
      display: grid;
      gap: 3px;
    }
    .mono {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-soft);
    }
    .brand strong {
      font-size: 0.98rem;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .hero-action {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.14);
      background:
        linear-gradient(145deg, var(--hero-action-a), var(--hero-action-b)),
        rgba(255,255,255,0.07);
      color: var(--text);
      border-radius: 999px;
      padding: 14px 18px;
      font: 700 0.92rem "Manrope", sans-serif;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 16px 36px rgba(0,0,0,0.22);
      transition: transform 220ms ease, background 220ms ease, border-color 220ms ease;
    }
    .hero-action:hover,
    .hero-action:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.24);
    }

    .stage-shell {
      position: relative;
      min-height: 86vh;
      border-radius: 38px;
      overflow: hidden;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .stage-shell::before,
    .stage-shell::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(18px);
      pointer-events: none;
      opacity: 0;
    }
    .stage-shell::before {
      width: 340px;
      height: 340px;
      background: var(--stage-glow-a);
      top: -120px;
      left: -90px;
    }
    .stage-shell::after {
      width: 380px;
      height: 380px;
      background: var(--stage-glow-b);
      right: -80px;
      bottom: -160px;
    }
    .stage-media {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .stage-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--bg);
      opacity: 0;
      transition: opacity 520ms ease;
      filter: none;
      will-change: opacity;
    }
    .video-glow {
      position: absolute;
      inset: 0;
      background: none;
      opacity: 0;
      transition: opacity 520ms ease;
      pointer-events: none;
    }
    .stage-shell[data-phase="region"] .stage-video,
    .stage-shell[data-phase="region"] .video-glow {
      opacity: 1;
    }
    .stage-shell[data-phase="national"] .stage-video,
    .stage-shell[data-phase="national"] .video-glow {
      opacity: 1;
    }

    .map-stage {
      position: absolute;
      inset: 0;
      padding: 24px;
      transition: opacity 460ms ease;
    }
    .map-stage svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .map-stage.is-muted {
      opacity: 0.24;
    }
    .map-stage.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .mainland-scene-layer,
    .mainland-scene-layer *,
    .inset-scene-layer,
    .inset-scene-layer * {
      pointer-events: none;
    }
    .mainland-scene-layer,
    .inset-scene-layer {
      isolation: isolate;
    }
    .map-scene-object-image {
      transform-box: fill-box;
      transform-origin: center;
      filter: drop-shadow(0 16px 32px rgba(0,0,0,0.28));
      image-rendering: auto;
      transition: opacity 220ms ease, filter 220ms ease;
    }
    .map-scene-object-image.is-placeholder {
      filter: none;
    }
    .mainland-scene-layer .map-scene-object-image {
      opacity: 0.94;
    }
    .inset-scene-layer .map-scene-object-image {
      opacity: 0.9;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.24));
    }
    .map-scene-object-image.is-role-water {
      mix-blend-mode: screen;
      filter: drop-shadow(0 8px 24px rgba(46,128,158,0.18));
    }
    .map-scene-object-image.is-role-atmosphere,
    .map-scene-object-image.is-role-effect {
      mix-blend-mode: screen;
    }
    .map-scene-object-image.is-role-terrain,
    .map-scene-object-image.is-role-landmark {
      filter: drop-shadow(0 18px 36px rgba(0,0,0,0.34));
    }
    .inset-scene-layer .map-scene-object-image.is-role-terrain,
    .inset-scene-layer .map-scene-object-image.is-role-landmark,
    .inset-scene-layer .map-scene-object-image.is-role-sprite {
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.26));
    }
    .mainland-scene-layer .map-scene-object-image.is-role-water {
      opacity: 0.46;
    }
    .mainland-scene-layer .map-scene-object-image.is-role-atmosphere {
      opacity: 0.3;
    }
    .mainland-scene-layer .map-scene-object-image.is-role-effect {
      opacity: 0.34;
    }
    .mainland-scene-layer .map-scene-object-image.is-role-terrain,
    .mainland-scene-layer .map-scene-object-image.is-role-landmark,
    .mainland-scene-layer .map-scene-object-image.is-role-nature,
    .mainland-scene-layer .map-scene-object-image.is-role-sprite {
      opacity: 0.94;
    }
    .inset-scene-layer .map-scene-object-image.is-role-water {
      opacity: 0.3;
    }
    .inset-scene-layer .map-scene-object-image.is-role-atmosphere {
      opacity: 0.2;
    }
    .inset-scene-layer .map-scene-object-image.is-role-effect {
      opacity: 0.24;
    }
    .inset-scene-layer .map-scene-object-image.is-role-sprite {
      opacity: 0.82;
    }
    .mainland-scene-layer[data-scene-phase="national"] .map-scene-object-image,
    .inset-scene-layer[data-scene-phase="national"] .map-scene-object-image {
      opacity: 0.82;
    }
    .mainland-scene-layer[data-scene-phase="national"] .map-scene-object-image.is-role-water {
      opacity: 0.38;
    }
    .inset-scene-layer[data-scene-phase="national"] .map-scene-object-image.is-role-water {
      opacity: 0.24;
    }

    .stage-copy {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: flex-end;
      padding: 28px;
      min-height: 86vh;
      align-items: end;
      pointer-events: none;
    }
    .stage-copy > * { pointer-events: auto; }
    .hero-panel {
      align-self: end;
      border-radius: 32px;
      padding: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)), var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(22px);
      opacity: 1;
      transition: opacity 420ms ease, transform 420ms ease;
    }
    .hero-panel h1 {
      margin: 0;
      font-family: "Syne", sans-serif;
      font-size: clamp(3.3rem, 7vw, 6.8rem);
      line-height: 0.9;
      letter-spacing: -0.06em;
      max-width: 10ch;
    }
    .hero-panel p,
    .kpi-card p,
    .section-note,
    .ranking-item span,
    .sparkline-value,
    .empty-state p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }
    .hero-panel {
      display: grid;
      gap: 18px;
      justify-self: end;
      max-width: 460px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(18px);
    }
    .stage-shell[data-phase="region"] .hero-panel,
    .stage-shell[data-phase="national"] .hero-panel {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .hero-chip-row,
    .control-row,
    .metric-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .chip-pill,
    .metric-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.09);
      background: var(--panel-faint);
      color: var(--text);
      font: 700 0.88rem "Manrope", sans-serif;
      text-decoration: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .metric-button,
    .chip-pill {
      cursor: pointer;
      appearance: none;
    }
    .metric-button.is-active,
    .chip-pill.is-active {
      border-color: rgba(255,255,255,0.18);
      background:
        linear-gradient(145deg, var(--button-active-a), var(--button-active-b)),
        rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.26), 0 14px 30px rgba(0,0,0,0.18);
    }

    .hero-title-block {
      display: grid;
      gap: 10px;
    }
    .hero-title-block h1 {
      max-width: 8ch;
      font-size: clamp(2.8rem, 6vw, 5.4rem);
    }
    .hero-chip-row {
      gap: 8px;
    }
    .hero-chip {
      border-radius: 999px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--panel-faint);
      font: 500 12px "IBM Plex Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-kpis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .kpi-card {
      border-radius: 24px;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05)),
        var(--panel);
      border: 1px solid rgba(255,255,255,0.12);
      min-height: 122px;
      display: grid;
      align-content: start;
      gap: 10px;
    }
    .kpi-card strong {
      font-family: "Syne", sans-serif;
      font-size: clamp(1.6rem, 3vw, 2.6rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      overflow-wrap: anywhere;
    }
    .kpi-card strong.is-textual {
      font-size: clamp(1.55rem, 2.4vw, 2.2rem);
      line-height: 0.88;
      letter-spacing: -0.04em;
    }
    .kpi-card .label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--muted-soft);
    }
    .kpi-card .meta {
      font-size: 0.86rem;
      color: var(--muted);
    }

    .switch-rail {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 6px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 420ms ease, transform 420ms ease;
      pointer-events: none;
    }
    .switch-rail.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .liquid-button {
      position: relative;
      overflow: hidden;
      appearance: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      border-radius: 999px;
      padding: 12px 16px;
      background: var(--panel-faint);
      font: 700 0.9rem "Manrope", sans-serif;
      cursor: pointer;
      transition: transform 220ms ease, border-color 220ms ease, background 220ms ease;
    }
    .liquid-button::before {
      content: "";
      position: absolute;
      inset: -20% -30%;
      background: linear-gradient(120deg, transparent 10%, rgba(255,255,255,0.25), transparent 52%);
      transform: translateX(-80%) rotate(8deg);
      transition: transform 520ms ease;
      pointer-events: none;
    }
    .liquid-button:hover::before,
    .liquid-button:focus-visible::before {
      transform: translateX(76%) rotate(8deg);
    }
    .liquid-button:hover,
    .liquid-button:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.22);
    }
    .liquid-button.is-active {
      background:
        linear-gradient(140deg, var(--button-active-a), var(--button-active-b)),
        rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 18px 36px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .story {
      margin-top: 0;
      display: none;
      gap: 22px;
      opacity: 0;
      transform: translateY(22px);
      pointer-events: none;
    }
    .story.is-visible {
      display: grid;
      margin-top: 20px;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      animation: story-enter 480ms ease both;
    }

    .subject-nav {
      position: sticky;
      top: var(--chapter-rail-top);
      z-index: 8;
      display: flex;
      align-items: flex-end;
      gap: 0;
      min-height: 96px;
      padding: 8px 14px 0;
      overflow-x: auto;
      overflow-y: visible;
      scrollbar-width: none;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)),
        rgba(7, 17, 26, 0.56);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 8px 24px rgba(0,0,0,0.16);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .subject-nav::-webkit-scrollbar {
      display: none;
    }
    .subject-nav::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(120deg, rgba(255,255,255,0.025), transparent 34%, transparent 70%, rgba(255,255,255,0.015));
      pointer-events: none;
    }
    .subject-nav::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 0;
      height: 1px;
      background: var(--chapter-rail-line);
      pointer-events: none;
    }

    .chapter-tab {
      position: relative;
      flex: 0 0 auto;
      min-width: var(--chapter-tab-min-width);
      margin-right: var(--chapter-tab-gap);
      padding: 0;
      border: 0;
      background: transparent;
      color: #213149;
      text-align: left;
      font: inherit;
      cursor: pointer;
      opacity: 0.94;
      transform: translateY(8px);
      transition: transform 220ms ease, opacity 220ms ease, filter 220ms ease;
    }
    .chapter-tab:last-child {
      margin-right: 0;
    }
    .chapter-tab:hover,
    .chapter-tab:focus-visible {
      transform: translateY(4px);
      outline: none;
      filter: brightness(1.02);
    }
    .chapter-tab.is-active {
      z-index: 5;
      opacity: 1;
      transform: translateY(0);
      filter: none;
    }
    .chapter-tab:not(.is-active) {
      filter: saturate(0.94);
    }
    .chapter-tab__shape {
      position: relative;
      display: grid;
      gap: 6px;
      min-height: var(--chapter-tab-height);
      padding: 12px 22px 10px 18px;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - var(--chapter-tab-skew-right)) 0, 100% 100%, var(--chapter-tab-skew-left) 100%);
      border-radius: 14px 14px 0 0;
      border: 1px solid rgba(33, 49, 73, 0.48);
      border-bottom: 0;
      box-shadow: none;
      transition: min-height 220ms ease, border-color 220ms ease, transform 220ms ease;
    }
    .chapter-tab__shape::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03) 42%, transparent 78%);
      pointer-events: none;
    }
    .chapter-tab__shape::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 10px;
      height: 1px;
      background: rgba(33, 49, 73, 0.22);
      opacity: 0;
      transform: scaleX(0.4);
      transform-origin: left center;
      transition: opacity 220ms ease, transform 220ms ease;
    }
    .chapter-tab.is-active .chapter-tab__shape {
      min-height: var(--chapter-tab-height-active);
      border-color: rgba(255,255,255,0.38);
      transform: translateY(-1px);
    }
    .chapter-tab.is-active .chapter-tab__shape::after {
      opacity: 1;
      transform: scaleX(1);
    }
    .chapter-tab[data-tone="1"] .chapter-tab__shape {
      background: var(--chapter-tab-overlay), var(--chapter-tone-1);
    }
    .chapter-tab[data-tone="2"] .chapter-tab__shape {
      background: var(--chapter-tab-overlay), var(--chapter-tone-2);
    }
    .chapter-tab[data-tone="3"] .chapter-tab__shape {
      background: var(--chapter-tab-overlay), var(--chapter-tone-3);
    }
    .chapter-tab[data-tone="4"] .chapter-tab__shape {
      background: var(--chapter-tab-overlay), var(--chapter-tone-4);
    }
    .chapter-tab__index {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(33, 49, 73, 0.5);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .chapter-tab__index::after {
      content: "";
      width: 28px;
      height: 1px;
      background: currentColor;
      opacity: 0.34;
    }
    .chapter-tab__label {
      font-family: "Manrope", sans-serif;
      font-size: 0.98rem;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.025em;
      text-wrap: balance;
    }
    .chapter-tab__meta {
      color: rgba(33, 49, 73, 0.68);
      font-size: 0.73rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.28;
      max-width: 22ch;
      opacity: 0.78;
    }

    .chapter-section {
      scroll-margin-top: var(--chapter-scroll-margin);
    }
    .chapter-section[data-tone="1"] {
      --chapter-glow: rgba(141, 184, 255, 0.22);
      --chapter-accent: #9fc2ff;
    }
    .chapter-section[data-tone="2"] {
      --chapter-glow: rgba(236, 157, 208, 0.22);
      --chapter-accent: #efb0da;
    }
    .chapter-section[data-tone="3"] {
      --chapter-glow: rgba(150, 224, 175, 0.22);
      --chapter-accent: #aee3b7;
    }
    .chapter-section[data-tone="4"] {
      --chapter-glow: rgba(142, 200, 245, 0.22);
      --chapter-accent: #9bcff6;
    }

    .section-card {
      border-radius: 34px;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04)),

      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: 0 32px 80px rgba(0,0,0,0.26);
      backdrop-filter: blur(20px);
    }
    .section-head {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
      padding: 22px 22px 20px;
      flex-wrap: wrap;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at top right, var(--chapter-glow, rgba(141, 184, 255, 0.18)), transparent 42%),
        linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03) 48%),
        rgba(255,255,255,0.03);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .section-title {
      display: grid;
      gap: 10px;
      max-width: 720px;
    }
    .chapter-title-block {
      gap: 12px;
    }
    .section-kicker-row {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .section-kicker {
      color: var(--chapter-accent, rgba(238, 247, 255, 0.78));
    }
    .section-kicker-rule {
      width: 48px;
      height: 1px;
      background: var(--chapter-accent, #9fc2ff);
      opacity: 0.9;
    }
    .section-title h2 {
      margin: 0;
      font-family: "Syne", sans-serif;
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
      max-width: 11ch;
    }
    .section-title-meta {
      display: inline-flex;
      align-items: center;

      max-width: 100%;
      min-height: 36px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: var(--chapter-accent, rgba(238, 247, 255, 0.78));
      font: 700 0.82rem "Manrope", sans-serif;
      letter-spacing: -0.01em;
    }
    .section-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 18px;
    }

    .viz-panel {
      border-radius: 28px;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        var(--panel-faint);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 360px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .viz-panel canvas,
    .viz-panel svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .viz-title {
      display: grid;
      gap: 6px;
    }
    .viz-title strong {
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }
    .viz-title span,
    .legend-row,
    .ranking-item small,
    .mini-stat small,
    .map-legend span,
    .map-empty {
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.9rem;
    }

    .legend-row,
    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }
    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .legend-dot,
    .legend-line {
      display: inline-block;
      flex: 0 0 auto;
      border-radius: 999px;
    }
    .legend-dot { width: 12px; height: 12px; }
    .legend-line { width: 22px; height: 0; border-top: 3px solid currentColor; }

    .employment-grid {
      grid-template-columns: minmax(0, 1.32fr) minmax(320px, 0.72fr);
      align-items: stretch;
    }
    .employment-main,
    .employment-side {
      position: relative;
      overflow: hidden;
    }
    .employment-main {
      gap: 18px;
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        var(--panel-faint);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .employment-main::before,
    .employment-side::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.7), transparent 96%);
    }
    .employment-intro {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .employment-title strong {
      font-size: clamp(1.35rem, 2vw, 1.8rem);
      color: var(--text);
      letter-spacing: -0.04em;
    }
    .employment-title span {
      color: var(--muted);
      max-width: 62ch;
    }
    .employment-controls {
      display: grid;
      gap: 12px;
      justify-items: end;
      min-width: min(100%, 320px);
    }
    .employment-select-wrap {
      display: grid;
      gap: 8px;
      width: min(100%, 320px);
      color: inherit;
      text-decoration: none;
    }
    .employment-select-label {
      color: rgba(238,247,255,0.56);
    }
    .employment-select-wrap select {
      width: 100%;
      appearance: none;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.09);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        var(--panel-faint);
      color: var(--text);
      padding: 12px 16px;
      font: 600 0.96rem "Manrope", sans-serif;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      cursor: pointer;
    }
    .employment-select-wrap select:focus-visible {
      outline: 2px solid rgba(159,194,255,0.34);
      outline-offset: 2px;
    }
    .employment-focus-switch {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }
    .employment-focus-button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 14px;
      font: 700 0.84rem "Manrope", sans-serif;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease, border-color 180ms ease;
    }
    .employment-focus-button:hover,
    .employment-focus-button.is-active {
      background: rgba(255,255,255,0.16);

      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }
    .employment-chart-shell {
      position: relative;
      z-index: 1;
      border-radius: 28px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(252,247,239,0.86));
      border: 1px solid rgba(22,33,44,0.08);
      box-shadow: 0 20px 48px rgba(15,23,35,0.08);
    }
    .employment-chart-shell svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .employment-legend,
    .employment-focus-card,
    .employment-note-card {
      position: relative;
      z-index: 1;
    }
    .employment-legend {
      color: var(--muted);
    }
    .employment-swatch {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 5px;
      flex: 0 0 auto;
    }
    .employment-swatch-positive {
      background: linear-gradient(180deg, rgba(38,193,160,0.95), rgba(38,193,160,0.38));
    }
    .employment-swatch-negative {
      background: linear-gradient(180deg, rgba(228,134,118,0.95), rgba(228,134,118,0.42));
    }
    .employment-side {
      gap: 16px;
      padding: 20px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06)),
        rgba(10,18,26,0.88);
    }
    .employment-focus-card {
      display: grid;
      gap: 14px;
      padding: 22px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .employment-focus-card h3,
    .employment-note-card h4 {
      margin: 0;
      font-family: "Syne", sans-serif;
      letter-spacing: -0.04em;
    }
    .employment-focus-card h3 {
      font-size: clamp(1.7rem, 2.8vw, 2.35rem);
      line-height: 0.96;
    }
    .employment-focus-card p,
    .employment-note-card p {
      margin: 0;
      color: rgba(238,247,255,0.72);
      line-height: 1.7;
    }
    .employment-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .employment-stat {
      display: grid;
      gap: 8px;
      min-height: 118px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .employment-stat-label {
      font: 500 11px "IBM Plex Mono", monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(238,247,255,0.54);
    }
    .employment-stat strong {
      font-family: "Syne", sans-serif;
      font-size: clamp(1.5rem, 2vw, 2rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
      color: #fff8ee;
    }
    .employment-stat small {
      color: rgba(238,247,255,0.62);
      line-height: 1.55;
    }
    .employment-principles {
      display: grid;
      gap: 12px;
    }
    .employment-note-card {
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .employment-note-card h4 {
      font-size: 1.08rem;
      color: #fff8ee;
    }
    .employment-tooltip {
      position: absolute;
      inset: auto auto 16px 16px;
      min-width: 188px;
      max-width: 240px;
      padding: 13px 15px;
      border-radius: 18px;
      background: rgba(16,25,34,0.92);
      color: #fbf7f0;
      box-shadow: 0 18px 44px rgba(15,23,35,0.24);
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 160ms ease, transform 160ms ease;

    .employment-tooltip.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
    .employment-tooltip .tooltip-overline {
      font: 500 12px "IBM Plex Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(251,247,240,0.68);
    }
    .employment-tooltip .tooltip-body {
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.55;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;

    .mini-stat {
      border-radius: 22px;
      padding: 16px;
      background: var(--panel-faint);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 112px;
      display: grid;
      gap: 8px;

    .mini-stat strong {
      font-family: "Syne", sans-serif;
      font-size: 1.75rem;
      line-height: 0.95;
      letter-spacing: -0.05em;
    }
    .mini-stat small,
    .map-empty,
    .tooltip {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ranking-list {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    .ranking-item,
    .sparkline-row {
      display: grid;
      gap: 4px;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--panel-faint);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .ranking-item strong,
    .sparkline-row strong {
      font-size: 0.97rem;
      letter-spacing: -0.02em;
    }
    .ranking-item .topline,
    .sparkline-row .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }
    .sparkline-stack {
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }
    .sparkline-canvas {
      width: 100%;
      height: 44px;
    }
    .sparkline-value {
      font-size: 0.86rem;
    }

    .select-wrap {
      position: relative;
      min-width: 260px;
    }
    .select-wrap select {
      width: 100%;
      appearance: none;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.09);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        var(--panel-faint);
      color: var(--text);
      padding: 12px 44px 12px 16px;
      font: 700 0.92rem "Manrope", sans-serif;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14);
    }
    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .map-card {
      min-height: 400px;
    }
    .map-card svg {
      min-height: 320px;
    }
    .empty-state {
      min-height: 260px;
      display: grid;
      place-items: center;
      text-align: center;
      gap: 10px;
      color: var(--muted);
    }
    .empty-state strong {
      font-family: "Syne", sans-serif;
      font-size: 1.8rem;
      letter-spacing: -0.04em;
    }

    .tooltip {
      position: fixed;
      z-index: 12;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--panel-strong);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 22px 48px rgba(0,0,0,0.34);
      backdrop-filter: blur(16px);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, calc(-100% - 10px));
      transition: opacity 160ms ease;
      max-width: 280px;
    }
    .tooltip.is-visible {
      opacity: 1;
    }
    .tooltip strong {
      display: block;
      color: var(--text);
      font-family: "Manrope", sans-serif;
      font-size: 0.96rem;
      letter-spacing: 0;
      text-transform: none;
      margin-top: 6px;
    }
    .footer {
      margin-top: 16px;
      padding: 0 6px;
      color: var(--muted-soft);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      font: 500 11px "IBM Plex Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .path-region,
    .path-department {
      stroke: rgba(255,255,255,0.16);
      stroke-width: 1.3px;
      transition: fill 220ms ease, opacity 220ms ease, stroke 220ms ease;
      cursor: pointer;
    }
    .path-region.is-unavailable,
    .path-department.is-unavailable {
      fill: var(--map-unavailable) !important;
      opacity: 0.48;
    }
    .path-region:hover,
    .path-department:hover {
      stroke: rgba(255,255,255,0.28);
    }
    .path-region.is-selected,
    .path-department.is-selected {
      stroke: rgba(255,255,255,0.42);
      stroke-width: 2.1px;
      filter: drop-shadow(0 0 22px rgba(255,255,255,0.22));
    }
    .inset-card {
      fill: var(--panel-faint);
      stroke: var(--line-strong);
      stroke-width: 1;
    }
    .inset-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      fill: rgba(238,247,255,0.7);
    }
    .map-region-label {
      fill: rgba(244,248,255,0.82);
      font-family: "Manrope", sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-anchor: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: rgba(8,19,28,0.88);
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .focus-department-path {
      fill: none;
      stroke: var(--focus-stroke);
      stroke-width: 1.05px;
      stroke-linejoin: round;
      stroke-linecap: round;
      filter: drop-shadow(0 0 12px var(--focus-glow));
    }
    .focus-city-dot {
      fill: rgba(255,255,255,0.94);
      stroke: rgba(8,19,28,0.92);
      stroke-width: 1.1px;
      filter: drop-shadow(0 0 10px var(--focus-glow));
    }
    .focus-city-label {
      fill: rgba(248,252,255,0.96);
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-anchor: middle;
      paint-order: stroke;
      stroke: rgba(8,19,28,0.88);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    @media (max-width: 1180px) {
      .scene-detail-optional {
        display: none;
      }
    }

    @media (max-width: 960px) {
      .scene-detail-compact-hide {
        display: none;
      }
    }

    .ripple-ring {
      fill: none;
      stroke: rgba(255,255,255,0.25);
      stroke-width: 1.5px;
    }

    @keyframes story-enter {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1240px) {
      .section-grid {
        grid-template-columns: 1fr;
      }
      .employment-grid {
        grid-template-columns: 1fr;
      }
      .employment-intro {
        flex-direction: column;
      }
      .employment-controls {
        width: 100%;
        justify-items: stretch;
      }
      .employment-focus-switch {
        justify-content: flex-start;
      }
      .hero-panel {
        justify-self: stretch;
        max-width: none;
      }
      .section-head {
        align-items: flex-start;
      }
    }

    @media (max-width: 860px) {
      :root {
        --chapter-rail-top: 10px;
      }
      .page {
        width: min(calc(100% - 16px), 1520px);
        margin: 8px auto 28px;
      }
      .shell {
        padding: 10px;
        border-radius: 28px;
      }
      .topbar {
        padding: 12px 14px;
        border-radius: 22px;
      }
      .brand img {
        width: 110px;
      }
      .stage-shell {

      function frNumber(value, digits = 1) {
        if (value == null || Number.isNaN(value)) return "—";
        return Number(value).toLocaleString("fr-FR", {
          minimumFractionDigits: digits,
          maximumFractionDigits: digits,
        });
      }

      function formatCount(value) {
        if (value == null || Number.isNaN(value)) return "—";
        const abs = Math.abs(value);
        if (abs >= 1e6) return `${frNumber(value / 1e6, 2)} M`;
        if (abs >= 1e3) return `${frNumber(value / 1e3, 1)} k`;
        return Number(value).toLocaleString("fr-FR", { maximumFractionDigits: 0 });
      }

      function formatCurrency(value) {
        if (value == null || Number.isNaN(value)) return "—";
        const abs = Math.abs(value);
        if (abs >= 1e9) return `${frNumber(value / 1e9, 1)} Md€`;
        if (abs >= 1e6) return `${frNumber(value / 1e6, 1)} M€`;
        return `${Number(value).toLocaleString("fr-FR", { maximumFractionDigits: 0 })} €`;

      function formatPercent(value, digits = 1) {
        if (value == null || Number.isNaN(value)) return "—";

        if (!chapterScrollLockKey) return;
        const chapter = chapterRegistry.find((entry) => entry.key === chapterScrollLockKey);
        const target = chapter ? document.getElementById(chapter.id) : null;
        if (!chapter || !target) {
          clearChapterScrollLock();
          return;
        }
        const rect = target.getBoundingClientRect();
        const activationLine = chapterActivationLine();
        const settledAtTop = Math.abs(window.scrollY - chapterScrollLockTop) <= 6;
        const settledAtSectionStart = Math.abs(rect.top - activationLine) <= 6;
        const settled = settledAtTop || settledAtSectionStart;
        const timedOut = performance.now() >= chapterScrollLockDeadline;
        if (settled || timedOut) {
          clearChapterScrollLock();
          syncActiveChapter({ force: true });
          return;
        }
        chapterScrollLockFrame = requestAnimationFrame(monitorChapterScrollLock);

      function scrollToChapter(chapter) {

        chapterScrollLockDeadline = performance.now() + (REDUCED_MOTION ? 0 : 1600);
        const destination = window.scrollY + target.getBoundingClientRect().top - chapterActivationLine() + 2;
        chapterScrollLockTop = Math.max(0, destination);

        let candidate = null;
        let fallback = chapterRegistry[0] || null;
        let bestDistance = Number.POSITIVE_INFINITY;
        chapterRegistry.forEach((chapter) => {
          const section = document.getElementById(chapter.id);
          if (!section) return;
          const rect = section.getBoundingClientRect();
          if (rect.top <= activationLine) {
            fallback = chapter;
          }
          if (rect.bottom <= activationLine || rect.top >= window.innerHeight * 0.74) {
            return;
          }
          const distance = Math.abs(rect.top - activationLine);
          if (distance < bestDistance) {
            bestDistance = distance;
            candidate = chapter;

        });
        return candidate || fallback;

      function buildScale(domain, colors) {

      function ringArea(ring) {
        const points = ring && ring.length > 1 && ring[0][0] === ring[ring.length - 1][0] && ring[0][1] === ring[ring.length - 1][1]
          ? ring.slice(0, -1)
          : ring;
        if (!points || points.length < 3) return 0;
        let area = 0;
        for (let index = 0; index < points.length; index += 1) {
          const [x1, y1] = points[index];
          const [x2, y2] = points[(index + 1) % points.length];
          area += (x1 * y2) - (x2 * y1);
        }
        return Math.abs(area / 2);
      }

      function polygonArea(polygon) {
