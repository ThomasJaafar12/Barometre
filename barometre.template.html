      }

      function pruneDisplayGeometry(geometry) {
        if (!geometry || geometry.type !== "MultiPolygon") return geometry;
        const rankedPolygons = geometry.coordinates
          .map((polygon) => ({ polygon, area: polygonArea(polygon) }))
          .filter((entry) => entry.area > 0)
          .sort((left, right) => right.area - left.area);
        if (rankedPolygons.length <= 1) return geometry;
        const minimumArea = rankedPolygons[0].area * DISPLAY_POLYGON_AREA_RATIO;
        const keptPolygons = rankedPolygons
          .filter((entry) => entry.area >= minimumArea)
          .map((entry) => entry.polygon);
        if (!keptPolygons.length) {
          return { type: "Polygon", coordinates: rankedPolygons[0].polygon };
        }
        return keptPolygons.length === 1
          ? { type: "Polygon", coordinates: keptPolygons[0] }
          : { type: "MultiPolygon", coordinates: keptPolygons };
      }

      const displayRegionFeatures = DATA.geography.regions.features.map((feature) => ({
        ...feature,
        geometry: pruneDisplayGeometry(feature.geometry),
      }));
      const displayRegionsGeojson = { ...DATA.geography.regions, features: displayRegionFeatures };
      const displayRegionFeatureByCode = new Map(displayRegionFeatures.map((feature) => [feature.properties.code, feature]));

      function readStoredSceneMode() {
        try {
          return window.localStorage.getItem(mapSceneConfig.storageKey || "barometre.dev.sceneMode");
        } catch (error) {
          return null;
        }
      }

      function writeStoredSceneMode(value) {
        try {
          window.localStorage.setItem(mapSceneConfig.storageKey || "barometre.dev.sceneMode", value);
        } catch (error) {
          // Ignore storage failures in static exports.
        }
      }

      function sceneCanToggle() {
        return Boolean(mapSceneConfig && mapSceneConfig.enabled && mapSceneConfig.assets && Object.keys(mapSceneConfig.assets).length);
      }

      function sceneMode() {
        if (!sceneCanToggle()) return "off";
        if (sceneState.runtimeEnabled == null) {
          const stored = readStoredSceneMode();
          sceneState.runtimeEnabled = stored || mapSceneConfig.modeDefault || "premium";
        }
        return sceneState.runtimeEnabled;
      }

      function sceneRuntimeEnabled() {
        return sceneMode() !== "off";
      }

      function sceneEnabled() {
        return sceneCanToggle() && sceneMode() === "premium";
      }

      function scenePhaseVisible(phase = state.phase) {
        return sceneEnabled() && Array.isArray(mapSceneConfig.visiblePhases) && mapSceneConfig.visiblePhases.includes(phase);
      }

      function setSceneMode(mode) {
        sceneState.runtimeEnabled = mode === "premium" ? "premium" : "off";
        writeStoredSceneMode(sceneState.runtimeEnabled);
        rerenderPremiumScene();
      }

      function setSceneRuntimeEnabled(value) {
        setSceneMode(value ? "premium" : "off");
      }

      function stopSceneMotion() {
        (sceneState.activeMotions || []).forEach((animation) => {
          if (animation && typeof animation.kill === "function") {
            animation.kill();
          }
        });
        sceneState.activeMotions = [];
      }

      function clearPremiumScene() {
        stopSceneMotion();
        if (chartRefs.regionMap.mainlandSceneBackdropGroup) {
          chartRefs.regionMap.mainlandSceneBackdropGroup.selectAll("*").remove();
        }
        if (chartRefs.regionMap.mainlandSceneOverlayGroup) {
          chartRefs.regionMap.mainlandSceneOverlayGroup.selectAll("*").remove();
        }
        if (chartRefs.regionMap.domSceneGroups) {
          chartRefs.regionMap.domSceneGroups.forEach((groups) => {
            groups.backdrop.selectAll("*").remove();
            groups.overlay.selectAll("*").remove();
          });
        }
      }

      function clearMapScene() {
        clearPremiumScene();
      }

      function preloadPremiumSceneAssets() {
        if (!sceneCanToggle()) return;
        if (!sceneState.preloadedSources) {
          sceneState.preloadedSources = new Set();
        }
        Object.values(mapSceneConfig.assets || {}).forEach((asset) => {
          if (!asset || !asset.src || sceneState.preloadedSources.has(asset.src)) return;
          const image = new Image();
          image.decoding = "async";
          image.src = asset.src;
          sceneState.preloadedSources.add(asset.src);
        });
      }

      function sceneAssetForObject(object) {
        const assetId = object.asset || object.assetId;
        return mapSceneConfig.assets && mapSceneConfig.assets[assetId];
      }

      function objectVisibleInPhase(object, phase = state.phase) {
        return !object.visiblePhases || object.visiblePhases.includes(phase);
      }

      function sceneObjectCrop(object, asset) {
        const fallback = asset && asset.contentBox
          ? asset.contentBox
          : { x: 0, y: 0, width: asset && asset.width ? asset.width : 1, height: asset && asset.height ? asset.height : 1 };
        const crop = object.crop || fallback;
        return {
          x: crop.x,
          y: crop.y,
          width: crop.width,
          height: crop.height,
        };
      }

      function sceneObjectPlacement(scopeKey, object, asset) {
        const crop = sceneObjectCrop(object, asset);
        const width = object.width;
        const height = object.height || (crop && crop.width && crop.height ? (width * crop.height) / crop.width : null);
        if (!Number.isFinite(width) || !Number.isFinite(height)) return null;
        if (scopeKey === "mainland") {
          return { crop, x: object.x, y: object.y, width, height };
        }
        const inset = mapLayout.domInsets[scopeKey];
        if (!inset) return null;
        return {
          crop,
          x: inset.x + object.x,
          y: inset.y + object.y,
          width,
          height,
        };
      }

      function registerSceneMotion(animation) {
        if (!animation) return;
        sceneState.activeMotions.push(animation);
      }

      function sceneObjectOpacity(entry) {
        const isMainland = entry.scopeKey === "mainland";
        const phaseMultiplier = state.phase === "national" ? 0.84 : 1;
        const roleDefaults = isMainland
          ? { water: 0.46, atmosphere: 0.3, effect: 0.34, terrain: 0.94, landmark: 0.94, nature: 0.94, sprite: 0.94, decor: 0.9 }
          : { water: 0.3, atmosphere: 0.2, effect: 0.24, terrain: 0.84, landmark: 0.84, nature: 0.8, sprite: 0.82, decor: 0.78 };
        const baseOpacity = Number.isFinite(entry.object.opacity) ? entry.object.opacity : (roleDefaults[entry.role] ?? roleDefaults.decor);
        if (baseOpacity <= 0) return 0;
        return Math.max(0.08, Math.min(1, baseOpacity * phaseMultiplier));
      }

      function applySceneMotion(image, object) {
        if (REDUCED_MOTION || !object.motion) return;
        const motion = object.motion;
        const vars = {
          duration: motion.duration || 16,
          ease: motion.ease || "sine.inOut",
          repeat: -1,
          yoyo: motion.yoyo !== false,
          delay: motion.delay || 0,
          force3D: true,
        };
        if (Number.isFinite(motion.dx)) vars.x = motion.dx;
        if (Number.isFinite(motion.dy)) vars.y = motion.dy;
        if (Number.isFinite(motion.scale)) vars.scale = motion.scale;
        if (Number.isFinite(motion.opacity)) vars.opacity = motion.opacity;
        registerSceneMotion(gsap.to(image.node(), vars));
      }

      function buildSceneEntries() {
        const entries = [];
        Object.entries(mapSceneConfig.scopes || {}).forEach(([scopeKey, scope]) => {
          (scope && scope.objects ? scope.objects : []).forEach((object, index) => {
            const asset = sceneAssetForObject(object);
            const isPlaceholder = Boolean(object.placeholder);
            if ((!asset || !asset.src) && !isPlaceholder) return;
            if (!objectVisibleInPhase(object)) return;
            const placement = sceneObjectPlacement(scopeKey, object, asset);
            if (!placement) return;
            entries.push({
              asset,
              index,
              object,
              isPlaceholder,
              placement,
              crop: placement.crop,
              role: object.role || asset.role || "decor",
              scopeKey,
              zIndex: object.zIndex || 0,
            });
          });
        });
        entries.sort((left, right) => left.zIndex - right.zIndex || left.index - right.index);
        const maxObjectCount = mapSceneConfig.budget && Number.isFinite(mapSceneConfig.budget.maxObjectCount)
          ? mapSceneConfig.budget.maxObjectCount
          : Number.POSITIVE_INFINITY;
        return entries.slice(0, maxObjectCount);
      }

      function sceneTargetGroup(entry) {
        const sceneSlot = entry.object.layer === "water" ? "backdrop" : "overlay";
        if (entry.scopeKey === "mainland") {
          return sceneSlot === "backdrop"
            ? chartRefs.regionMap.mainlandSceneBackdropGroup
            : chartRefs.regionMap.mainlandSceneOverlayGroup;
        }
        const scopeGroups = chartRefs.regionMap.domSceneGroups && chartRefs.regionMap.domSceneGroups.get(entry.scopeKey);
        return scopeGroups ? scopeGroups[sceneSlot] : null;
      }

      function renderPremiumScene() {
        clearPremiumScene();
        if (!scenePhaseVisible(state.phase) || !chartRefs.regionMap.rootGroup) return;
        if (chartRefs.regionMap.mainlandSceneBackdropGroup) {
          chartRefs.regionMap.mainlandSceneBackdropGroup.attr("data-scene-phase", state.phase);
        }
        if (chartRefs.regionMap.mainlandSceneOverlayGroup) {
          chartRefs.regionMap.mainlandSceneOverlayGroup.attr("data-scene-phase", state.phase);
        }
        if (chartRefs.regionMap.domSceneGroups) {
          chartRefs.regionMap.domSceneGroups.forEach((groups) => {
            groups.backdrop.attr("data-scene-phase", state.phase);
            groups.overlay.attr("data-scene-phase", state.phase);
          });
        }
        buildSceneEntries().forEach((entry) => {
          const targetGroup = sceneTargetGroup(entry);
          if (!targetGroup) return;
          const frame = targetGroup.append("svg")
            .attr("class", `map-scene-object-image map-scene-object-${entry.scopeKey === "mainland" ? "mainland" : "dom"} is-role-${entry.role} is-layer-${entry.object.layer || "decor"}${entry.isPlaceholder ? " is-placeholder" : ""}`)
            .attr("x", entry.placement.x)
            .attr("y", entry.placement.y)
            .attr("width", entry.placement.width)
            .attr("height", entry.placement.height)
            .attr("data-role", entry.role)
            .attr("data-layer", entry.object.layer || "decor")
            .attr("data-scene-object-id", entry.object.id || "")
            .attr("data-scene-scope", entry.scopeKey)
            .attr("data-scene-layer-id", entry.object.layerId || entry.object.layer || "")
            .attr("preserveAspectRatio", "none")
            .attr("overflow", "hidden");
          if (entry.isPlaceholder) {
            frame.append("rect")
              .attr("x", 0)
              .attr("y", 0)
              .attr("width", entry.placement.width)
              .attr("height", entry.placement.height)
              .attr("fill", "transparent");
          } else {
            frame.attr("viewBox", `${entry.crop.x} ${entry.crop.y} ${entry.crop.width} ${entry.crop.height}`);
            frame.append("image")
              .attr("href", entry.asset.src)
              .attr("x", 0)
              .attr("y", 0)
              .attr("width", entry.asset.width)
              .attr("height", entry.asset.height)
              .attr("preserveAspectRatio", "none");
          }
          frame.style("opacity", sceneObjectOpacity(entry));
          if (entry.object.rotation) {
            frame.attr("transform", `rotate(${entry.object.rotation} ${entry.placement.x + entry.placement.width / 2} ${entry.placement.y + entry.placement.height / 2})`);
          }
          applySceneMotion(frame, entry.object);
          if (typeof bindSceneEditorFrame === "function") {
            bindSceneEditorFrame(frame, entry);
          }
        });
        if (typeof refreshSceneEditorAfterRender === "function") {
          refreshSceneEditorAfterRender();
        }
      }

      function renderMapScene() {
        renderPremiumScene();
      }

      function rerenderPremiumScene() {
        if (!chartRefs.regionMap.rootGroup) return;
        renderPremiumScene();
      }

      function rerenderMapScene() {
        rerenderPremiumScene();
      }

      function showTooltip(event, label, value) {
        tooltipLabel.textContent = label;
        tooltipValue.textContent = value;
        tooltip.style.left = `${event.clientX}px`;
        tooltip.style.top = `${event.clientY}px`;
        tooltip.classList.add("is-visible");
      }

      function hideTooltip() {
        tooltip.classList.remove("is-visible");
      }

      function drawCompositeMap(selection, featureCollection, config) {
        selection.selectAll("*").remove();
        const root = selection.append("g").attr("class", "map-root");
        const cameraGroup = root.append("g").attr("class", "camera-group");
        const featureLayer = cameraGroup.append("g").attr("class", "feature-layer");
        const focusGroup = cameraGroup.append("g").attr("class", "focus-layer");
        const features = featureCollection.features;
        const mainlandFeatures = features.filter((feature) => !domCodes.has(config.regionResolver(feature)));
        const projection = d3.geoMercator().fitExtent(
          [[mapLayout.mainlandExtent[0], mapLayout.mainlandExtent[1]], [mapLayout.mainlandExtent[2], mapLayout.mainlandExtent[3]]],
          { type: "FeatureCollection", features: mainlandFeatures },
        );
        const path = d3.geoPath(projection);
        const pathByCode = new Map();
        const labelByCode = new Map();
        const pathGeneratorByCode = new Map();

        const mainlandSceneBackdropGroup = featureLayer.append("g").attr("class", "mainland-scene-layer is-backdrop");
        const mainlandGroup = featureLayer.append("g").attr("class", "mainland-layer");
        const mainlandSceneOverlayGroup = featureLayer.append("g").attr("class", "mainland-scene-layer is-overlay");
        const labelLayer = config.showMainlandLabels ? featureLayer.append("g").attr("class", "mainland-label-layer") : null;
        const domSceneGroups = new Map();
        mainlandFeatures.forEach((feature) => {
          const key = config.keyResolver(feature);
          const element = mainlandGroup.append("path")
            .datum(feature)
            .attr("class", config.className(feature))
            .attr("d", path)
              .attr("fill", config.fillResolver(feature))
              .attr("data-code", key)
              .on("mouseenter", (event, datum) => {
                if (typeof sceneStudioActive === "function" && sceneStudioActive()) return;
                element.raise();
                const tooltipText = config.tooltipResolver(datum);
                showTooltip(event, tooltipText.label, tooltipText.value);
              })
              .on("mousemove", (event, datum) => {
                if (typeof sceneStudioActive === "function" && sceneStudioActive()) return;
                const tooltipText = config.tooltipResolver(datum);
                showTooltip(event, tooltipText.label, tooltipText.value);
              })
              .on("mouseleave", () => {
                if (typeof sceneStudioActive === "function" && sceneStudioActive()) return;
                hideTooltip();
              });
          if (config.clickable) {
            element.on("click", () => {
              if (typeof sceneStudioActive === "function" && sceneStudioActive()) return;
              config.onClick(key);
            });
          }
          pathByCode.set(key, element);
          pathGeneratorByCode.set(key, path);
        });
        if (labelLayer) {
          mainlandFeatures.forEach((feature) => {
            const code = config.regionResolver(feature);
            const region = regionsByCode.get(code);
            if (!region) return;
            const layout = MAINLAND_REGION_LABELS.get(code) || { lines: [region.name] };
            const [baseX, baseY] = path.centroid(feature);
            if (!Number.isFinite(baseX) || !Number.isFinite(baseY)) return;
            const x = baseX + (layout.dx || 0);
            const lineHeight = layout.lineHeight || 14;
            const startY = baseY + (layout.dy || 0) - ((layout.lines.length - 1) * lineHeight) / 2;
            const text = labelLayer.append("text")
              .attr("class", "map-region-label")
              .attr("x", x)
              .attr("y", startY)
              .attr("data-code", code);
            if (layout.fontSize) {
              text.style("font-size", `${layout.fontSize}px`);
            }
            layout.lines.forEach((line, index) => {
              text.append("tspan")
                .attr("x", x)
                .attr("y", startY + index * lineHeight)
                .text(line);
            });
            labelByCode.set(code, text);
          });
        }

        Object.entries(mapLayout.domInsets).forEach(([regionCode, inset]) => {
          const insetFeatures = features.filter((feature) => config.regionResolver(feature) === regionCode);
          const group = featureLayer.append("g").attr("class", `inset inset-${regionCode}`);
          group.append("rect").attr("class", "inset-card").attr("x", inset.x).attr("y", inset.y).attr("width", inset.width).attr("height", inset.height).attr("rx", 24);
          const backdropGroup = group.append("g").attr("class", "inset-scene-layer is-backdrop");
          const pathGroup = group.append("g").attr("class", "inset-path-layer");
          const overlayGroup = group.append("g").attr("class", "inset-scene-layer is-overlay");
          domSceneGroups.set(regionCode, { backdrop: backdropGroup, overlay: overlayGroup });
          group.append("text").attr("class", "inset-label").attr("x", inset.x + 16).attr("y", inset.y + 22).text(regionsByCode.get(regionCode).name);
          const insetProjection = d3.geoMercator().fitExtent(
            [[inset.x + 18, inset.y + 34], [inset.x + inset.width - 18, inset.y + inset.height - 18]],
            { type: "FeatureCollection", features: insetFeatures },
          );
          const insetPath = d3.geoPath(insetProjection);
          insetFeatures.forEach((feature) => {
            const key = config.keyResolver(feature);
            const element = pathGroup.append("path")
              .datum(feature)
              .attr("class", config.className(feature))
              .attr("d", insetPath)
              .attr("fill", config.fillResolver(feature))
              .attr("data-code", key)
              .on("mouseenter", (event, datum) => {
                if (typeof sceneStudioActive === "function" && sceneStudioActive()) return;
                element.raise();
                const tooltipText = config.tooltipResolver(datum);
                showTooltip(event, tooltipText.label, tooltipText.value);
              })
              .on("mousemove", (event, datum) => {
                if (typeof sceneStudioActive === "function" && sceneStudioActive()) return;
                const tooltipText = config.tooltipResolver(datum);
                showTooltip(event, tooltipText.label, tooltipText.value);
              })
              .on("mouseleave", () => {
                if (typeof sceneStudioActive === "function" && sceneStudioActive()) return;
                hideTooltip();
              });
            if (config.clickable) {
              element.on("click", () => {
                if (typeof sceneStudioActive === "function" && sceneStudioActive()) return;
                config.onClick(key);
              });
            }
            pathByCode.set(key, element);
            pathGeneratorByCode.set(key, insetPath);
          });
        });

        return {
          rootGroup: root,
          cameraGroup,
          cameraState: { scale: 1, x: 0, y: 0 },
          domSceneGroups,
          featureLayer,
          focusGroup,
          mainlandSceneBackdropGroup,
          mainlandSceneOverlayGroup,
          pathByCode,
          labelByCode,
          pathGeneratorByCode,
        };
      }

      function renderLandingMap() {
        const regionValues = mapRegionValues();
        const numericValues = [...regionValues.values()].filter((value) => value != null);
        const colorScale = numericValues.length
          ? buildScale(d3.extent(numericValues), [paletteToken("map-national-low", "rgba(255,255,255,0.08)"), paletteToken("map-national-high", "rgba(120,236,203,0.9)")])
          : () => paletteToken("map-national-low", "rgba(255,255,255,0.08)");
        chartRefs.regionMap = drawCompositeMap(landingMapSvg, displayRegionsGeojson, {
          clickable: true,
          showMainlandLabels: true,
          keyResolver: (feature) => feature.properties.code,
          regionResolver: (feature) => feature.properties.code,
          className: (feature) => `path-region${regionsByCode.get(feature.properties.code).hasData ? "" : " is-unavailable"}`,
          fillResolver: (feature) => {
            if (state.phase === "national") {
              const value = regionValues.get(feature.properties.code);
              return value != null ? colorScale(value) : paletteToken("map-idle", "rgba(255,255,255,0.06)");
            }
            const theme = themeForRegion(feature.properties.code);
            return state.phase !== "landing" && state.selectedRegion === feature.properties.code ? theme.accent : paletteToken("map-idle", "rgba(255,255,255,0.06)");
          },
          tooltipResolver: (feature) => {
            const region = regionsByCode.get(feature.properties.code);
            if (state.phase === "national" && region.hero.payroll && region.hero.payroll.value != null) {
              return { label: region.name, value: formatCurrency(region.hero.payroll.value) };
            }
            if (!region.hasData) return { label: region.name, value: "Données indisponibles" };
            return { label: region.name, value: "Entrer" };
          },
          onClick: (code) => transitionToRegion(code, false),
        });
        renderMapScene();
        highlightSelectedRegion();
      }

      function highlightSelectedRegion() {
        chartRefs.regionMap.pathByCode.forEach((element, code) => {
          const isSelected = state.phase === "region" && code === state.selectedRegion;
          element.classed("is-selected", isSelected);
          if (state.phase === "region") {
            const theme = themeForRegion(code);
            element.attr("fill", isSelected ? theme.accent : paletteToken("map-idle", "rgba(255,255,255,0.06)"));
          }
          if (isSelected) {
            element.raise();
          }
        });
        chartRefs.regionMap.labelByCode.forEach((element, code) => {
          element.attr("display", state.phase === "region" ? "none" : null);
        });
      }

      function hideMapLabels() {
        chartRefs.regionMap.labelByCode.forEach((element) => {
          element.attr("display", "none");
        });
      }

      function updateVideo(regionCode) {
        const src = regionCode === "national"
          ? nationalVideo
          : (regionsByCode.get(regionCode) || {}).video || nationalVideo;
        if (stageVideo.dataset.src === src) {
          stageVideo.play().catch(() => {});
          return;
        }
        stageVideo.dataset.src = src;
        stageVideo.src = src;
        stageVideo.load();
        stageVideo.play().catch(() => {});
      }

      function clearFocusOverlay() {
        if (chartRefs.regionMap.focusGroup) {
          chartRefs.regionMap.focusGroup.selectAll("*").remove();
        }
      }

      function applyCameraTransform() {
        const { cameraGroup, cameraState } = chartRefs.regionMap;
        if (!cameraGroup || !cameraState) return;
        cameraGroup.attr("transform", `translate(${cameraState.x},${cameraState.y}) scale(${cameraState.scale})`);
      }

      function getRegionCameraTarget(regionCode, options = {}) {
        const selection = chartRefs.regionMap.pathByCode.get(regionCode);
        if (!selection) return null;
        const node = selection.node();
        const bbox = node.getBBox();
        const scaleMultiplier = options.scaleMultiplier ?? 1;
        const minScale = options.minScale ?? 1.8;
        const maxScale = options.maxScale ?? 4.2;
        const targetScale = Math.max(minScale, Math.min(maxScale, (620 / Math.max(bbox.width, bbox.height)) * scaleMultiplier));
        return {
          scale: targetScale,
          x: mapLayout.width / 2 - (bbox.x + bbox.width / 2) * targetScale,
          y: mapLayout.height / 2 - (bbox.y + bbox.height / 2) * targetScale,
        };
      }

      function animateCameraToTarget(target, options = {}) {
        if (!target) return Promise.resolve();
        const transform = chartRefs.regionMap.cameraState;
        if (REDUCED_MOTION) {
          transform.scale = target.scale;
          transform.x = target.x;
          transform.y = target.y;
          applyCameraTransform();
          return Promise.resolve();
        }
        return new Promise((resolve) => {
          gsap.to(transform, {
            scale: target.scale,
            x: target.x,
            y: target.y,
            duration: options.duration ?? 1.2,
            ease: options.ease ?? "power2.inOut",
            onUpdate: applyCameraTransform,
            onComplete: resolve,
          });
        });
      }

      function drawDepartmentFocusPaths(regionCode) {
        const focusGroup = chartRefs.regionMap.focusGroup;
        const generator = chartRefs.regionMap.pathGeneratorByCode.get(regionCode);
        if (!focusGroup || !generator || !DATA.geography.departments) return [];
        clearFocusOverlay();
        return DATA.geography.departments.features
          .filter((feature) => feature.properties.region === regionCode)
          .map((feature) => focusGroup.append("path")
            .datum(feature)
            .attr("class", "focus-department-path")
            .attr("d", generator(feature))
            .attr("stroke-dasharray", 1)
            .attr("stroke-dashoffset", 1)
            .attr("pathLength", 1)
            .attr("opacity", 0));
      }

      function drawRegionCityMarker(regionCode) {
        const focusGroup = chartRefs.regionMap.focusGroup;
        const generator = chartRefs.regionMap.pathGeneratorByCode.get(regionCode);
        const city = REGION_PRIMARY_CITIES.get(regionCode);
        if (!focusGroup || !generator || !city || typeof generator.projection !== "function") return null;
        const projection = generator.projection();
        if (!projection) return null;
        const projected = projection(city.coordinates);
        if (!projected || !Number.isFinite(projected[0]) || !Number.isFinite(projected[1])) return null;
        const [x, y] = projected;
        const group = focusGroup.append("g").attr("class", "focus-city").attr("opacity", 0);
        group.append("circle").attr("class", "focus-city-dot").attr("cx", x).attr("cy", y).attr("r", 3.6);
        group.append("text").attr("class", "focus-city-label").attr("x", x).attr("y", y - 14).text(city.name);
        return group;
      }

      function animateDepartmentFocus(regionCode) {
        const paths = drawDepartmentFocusPaths(regionCode);
        const cityMarker = drawRegionCityMarker(regionCode);
        if (!paths.length) return Promise.resolve();
        if (REDUCED_MOTION) {
          paths.forEach((path) => path.attr("stroke-dashoffset", 0).attr("opacity", 1));
          if (cityMarker) cityMarker.attr("opacity", 1);
          return Promise.resolve();
        }
        return new Promise((resolve) => {
          const timeline = gsap.timeline({ onComplete: resolve });
          const totalStagger = 0.7;
          const eachDelay = paths.length > 1 ? totalStagger / (paths.length - 1) : 0;
          paths.forEach((path, index) => {
            timeline.to(path.node(), {
              attr: { "stroke-dashoffset": 0 },
              opacity: 1,
              duration: 0.62,
              ease: "power2.out",
            }, index * eachDelay);
          });
          if (cityMarker) {
            timeline.to(cityMarker.node(), {
              opacity: 1,
              duration: 0.38,
              ease: "power2.out",
            }, Math.min(totalStagger * 0.45, 0.42));
          }
        });
      }

      async function parseDeferredData() {
        const binary = atob(DEFERRED_GZIP);
        const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
        return JSON.parse(await new Response(stream).text());
      }

      function ensureDeferredData() {
        if (DATA.modules && DATA.geography.departments) {
          return Promise.resolve(DATA);
        }
        deferredDataPromise ??= parseDeferredData().then((deferred) => {
          DATA.geography = { ...DATA.geography, ...deferred.geography };
          DATA.modules = deferred.modules;
          state.sectorSeriesKey ??= DATA.modules.sector.national.defaultSeriesKey;
          state.autoSector ??= DATA.modules.auto.defaultSector;
          return DATA;
        });
        return deferredDataPromise;
      }

      function resetCamera() {
        chartRefs.regionMap.cameraState.scale = 1;
        chartRefs.regionMap.cameraState.x = 0;
        chartRefs.regionMap.cameraState.y = 0;
        applyCameraTransform();
      }

      function setMapStageMode(mode) {
        mapStage.classList.remove("is-muted", "is-hidden");
        if (mode === "landing") {
          gsap.set(mapStage, { opacity: 1 });
          return;
        }
        if (mode === "national") {
          gsap.set(mapStage, { opacity: 1 });
          return;
        }
        clearPremiumScene();
        mapStage.classList.add("is-hidden");
        gsap.set(mapStage, { opacity: 0 });
      }

      function scheduleStoryRender() {
        if (storyRenderHandle != null) cancelAnimationFrame(storyRenderHandle);
        storyRenderHandle = requestAnimationFrame(() => {
          storyRenderHandle = null;
          ensureDeferredData()
            .then(() => {
              renderStoryModules();
              refreshChapterTracking();
              if (!scrollRevealMounted) {
                mountScrollReveal();
                scrollRevealMounted = true;
              } else {
                ScrollTrigger.refresh();
              }
            })
            .catch((error) => console.error("Deferred payload error", error));
        });
      }

      function revealContent() {
        story.classList.add("is-visible");
        switchRail.classList.add("is-visible");
        renderSwitchRail();
        refreshChapterTracking();
      }

      function applyPhase(phase) {
        state.phase = phase;
        stageShell.dataset.phase = phase;
        clearChapterScrollLock();
        renderHeaderActions();
        if (phase === "landing") {
          story.classList.remove("is-visible");
          switchRail.classList.remove("is-visible");
          if (chapterObserver) {
            chapterObserver.disconnect();
          }
          setMapStageMode("landing");
        } else if (phase === "national") {
          setMapStageMode("national");
        }
      }

      function animateFranceRipple() {
        const values = DATA.regions.map((region) => region.hero.payroll && region.hero.payroll.value).filter((value) => value != null);
        const scale = buildScale(d3.extent(values), ["rgba(255,255,255,0.08)", "rgba(120,236,203,0.92)"]);
        const center = { x: mapLayout.width / 2, y: mapLayout.height / 2 };
        const ring = chartRefs.regionMap.focusGroup.append("circle").attr("class", "ripple-ring").attr("cx", center.x).attr("cy", center.y).attr("r", 30).attr("opacity", 0.7);
        const timeline = gsap.timeline();
        timeline.to(ring.node(), { attr: { r: 760 }, opacity: 0, duration: REDUCED_MOTION ? 0.01 : 1.8, ease: "power2.out" });
        chartRefs.regionMap.pathByCode.forEach((selection, code) => {
          const region = regionsByCode.get(code);
          const value = region.hero.payroll && region.hero.payroll.value;
          const box = selection.node().getBBox();
          const dx = center.x - (box.x + box.width / 2);
          const dy = center.y - (box.y + box.height / 2);
          const delay = Math.sqrt(dx * dx + dy * dy) / 560;
          timeline.to(selection.node(), { fill: value != null ? scale(value) : "rgba(255,255,255,0.06)", duration: REDUCED_MOTION ? 0.01 : 0.9, ease: "power2.out" }, delay);
        });
        timeline.add(() => clearFocusOverlay());
        return timeline;
      }

      function transitionToLanding() {
        regionTransitionToken += 1;
        clearFocusOverlay();
        clearMapScene();
        gsap.killTweensOf(chartRefs.regionMap.cameraState);
        gsap.killTweensOf(mapStage);
        stageVideo.pause();
        resetCamera();
        setTheme(null);
        applyPhase("landing");
        renderLandingMap();
        window.scrollTo({
          top: 0,
          behavior: REDUCED_MOTION ? "auto" : "smooth",
        });
      }

      function transitionToNational(fromRail) {
        regionTransitionToken += 1;
        clearFocusOverlay();
        clearPremiumScene();
        gsap.killTweensOf(chartRefs.regionMap.cameraState);
        gsap.killTweensOf(mapStage);
        resetCamera();
        applyPhase("national");
        setTheme(state.selectedRegion);
        updateVideo("national");
        mapStage.classList.remove("is-hidden", "is-muted");
        gsap.set(mapStage, { opacity: 1 });
        renderLandingMap();
        renderHero();
        if (REDUCED_MOTION || fromRail) {
          animateFranceRipple();
          revealContent();
          scheduleStoryRender();
          setMapStageMode("national");
          return;
        }
        const timeline = gsap.timeline();
        timeline.add(() => animateFranceRipple(), 0.05);
        timeline.call(() => {
          revealContent();
          scheduleStoryRender();
          setMapStageMode("national");
        }, null, 1.45);
      }

      async function transitionToRegion(regionCode, fromRail) {
        const transitionToken = ++regionTransitionToken;
        state.selectedRegion = regionCode;
        setTheme(regionCode);
        hideMapLabels();
        renderHero();
        renderSwitchRail();
        updateVideo(regionCode);
        clearFocusOverlay();
        clearPremiumScene();
        gsap.killTweensOf(chartRefs.regionMap.cameraState);
        gsap.killTweensOf(mapStage);

        if (REDUCED_MOTION || fromRail || state.phase !== "landing") {
          applyPhase("region");
          setMapStageMode("region");
          revealContent();
          scheduleStoryRender();
          return;
        }

        mapStage.classList.remove("is-hidden", "is-muted");
        gsap.set(mapStage, { opacity: 1 });
        resetCamera();

        await animateCameraToTarget(
          getRegionCameraTarget(regionCode),
          { duration: 1.2, ease: "power2.inOut" },
        );
        if (transitionToken !== regionTransitionToken) return;

        await ensureDeferredData().catch((error) => {
          console.error("Deferred payload error", error);
        });
        if (transitionToken !== regionTransitionToken) return;

        await animateDepartmentFocus(regionCode);
        if (transitionToken !== regionTransitionToken) return;

        await animateCameraToTarget(
          getRegionCameraTarget(regionCode, { scaleMultiplier: 1.28, maxScale: 5.1 }),
          { duration: 1.22, ease: "power2.out" },
        );
        if (transitionToken !== regionTransitionToken) return;

        clearFocusOverlay();
        applyPhase("region");
        renderHero();
        await new Promise((resolve) => {
          gsap.to(mapStage, {
            opacity: 0,
            duration: 0.32,
            ease: "power2.inOut",
            onComplete: resolve,
          });
        });
        if (transitionToken !== regionTransitionToken) return;

        setMapStageMode("region");
        revealContent();
        scheduleStoryRender();
        clearFocusOverlay();
      }

      function renderMetricSwitch(containerId, items, activeKey, onChange) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        items.forEach((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `metric-button${item.key === activeKey ? " is-active" : ""}`;
          button.textContent = item.label;
          button.addEventListener("click", () => onChange(item.key));
          container.appendChild(button);
        });
      }

      function renderEmptyState(target, title, message) {
        target.innerHTML = `<div class="empty-state"><strong>${title}</strong><p>${message}</p></div>`;
      }
__CHAPTER_MODULES_SCRIPT__
      function renderStoryModules() {
        chapterRegistry.forEach((chapter) => chapter.render());
      }

      function setupFooter() {
        const generatedAt = new Date(DATA.meta.generatedAt);
        document.getElementById("footerTimestamp").textContent = `Généré ${generatedAt.toLocaleDateString("fr-FR", { dateStyle: "medium" })} / ${generatedAt.toLocaleTimeString("fr-FR", { timeStyle: "short" })}`;
      }

      function initStageButtons() {
        franceButton.addEventListener("click", () => transitionToNational(false));
        backToMapButton.addEventListener("click", transitionToLanding);
      }

      function initChapterNavigation() {
        hydrateChapterSections();
        renderSubjectNav();
        window.addEventListener("resize", refreshChapterTracking, { passive: true });
      }

      function mountScrollReveal() {
        d3.selectAll(".section-card").each(function() {
          gsap.from(this, {
            opacity: 0,
            y: 24,
            duration: REDUCED_MOTION ? 0.01 : 0.75,
            ease: "power2.out",
            scrollTrigger: { trigger: this, start: "top 82%" },
          });
        });
      }

      function boot() {
        applyCurrentPalette({ persist: false });
        setTheme(null);
        initPaletteDevtools();
        initChapterNavigation();
        setupFooter();
        initStageButtons();
        renderLandingMap();
        renderHero();
        renderSwitchRail();
        renderHeaderActions();
        stageVideo.muted = true;
        setMapStageMode("landing");
        preloadPremiumSceneAssets();
        ensureDeferredData().catch((error) => console.error("Deferred payload error", error));
      }

      boot();
    })();
  </script>
</body>
</html>
